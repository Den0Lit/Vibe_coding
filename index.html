<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA DocHub — Двухцветный репозиторий</title>
    <style>
        /* ОПРЕДЕЛЕНИЕ ПАЛИТРЫ ЧЕРЕЗ ПЕРЕМЕННЫЕ */
        :root {
            /* ТЕМНАЯ ТЕМА (ПО УМОЛЧАНИЮ) */
            --bg-gradient: linear-gradient(180deg, #0f172a 0%, #020617 100%);
            --text-main: #f1f5f9;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(71, 85, 105, 0.4);
            --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --input-bg: rgba(15, 23, 42, 0.5);
            --input-border: rgba(71, 85, 105, 0.5);
            --input-text: #ffffff;
            --table-bg: rgba(30, 41, 59, 0.2);
            --table-border: #1e293b;
            --steps-text: #cbd5e1;
            --th-bg: #0f172a;
            --th-text: #94a3b8;
            --theme-btn-bg: rgba(255, 255, 255, 0.05);
            --theme-btn-border: #475569;
            --theme-btn-text: #f1f5f9;
        }

        [data-theme="light"] {
            /* СВЕТЛАЯ ТЕМА */
            --bg-gradient: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
            --text-main: #0f172a;
            --card-bg: #ffffff;
            --card-border: #cbd5e1;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --input-bg: #f8fafc;
            --input-border: #cbd5e1;
            --input-text: #0f172a;
            --table-section-bg: #ffffff;
            --table-bg: #ffffff;
            --table-border: #cbd5e1;
            --steps-text: #334155;
            --th-bg: #f1f5f9;
            --th-text: #475569;
            --theme-btn-bg: #f1f5f9;
            --theme-btn-border: #cbd5e1;
            --theme-btn-text: #0f172a;
        }

        html, body {
            background: var(--bg-gradient) !important;
            color: var(--text-main) !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 24px; box-sizing: border-box; overflow-y: auto;
            transition: background 0.3s, color 0.3s;
        }
        .floating-card {
            background-color: var(--card-bg) !important;
            border: 1px solid var(--card-border) !important;
            border-radius: 16px !important; padding: 24px !important;
            box-shadow: var(--card-shadow) !important; margin-bottom: 32px;
            transition: background-color 0.3s, border 0.3s, box-shadow 0.3s;
        }
        .form-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(71, 85, 105, 0.3); padding-bottom: 16px; margin-bottom: 20px; }
        
        /* Кнопка смены темы */
        .theme-toggle-btn {
            background-color: var(--theme-btn-bg);
            border: 1px solid var(--theme-btn-border);
            color: var(--theme-btn-text);
            padding: 8px 14px; font-size: 13px; font-weight: 600; border-radius: 10px;
            cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s;
        }
        .theme-toggle-btn:hover { opacity: 0.8; }

        .tab-group { display: flex; background-color: rgba(15, 23, 42, 0.15); padding: 5px; border-radius: 12px; border: 1px solid var(--card-border); width: 270px; }
        .tab-btn { flex: 1; padding: 9px 12px; font-size: 14px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active-tc { background-color: #4f46e5 !important; color: white !important; }
        .tab-btn.active-cl { background-color: #059669 !important; color: white !important; }
        .tab-btn.inactive { background-color: transparent !important; color: #94a3b8 !important; }
        .form-grid { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 18px; }
        .input-group { flex: 1; min-width: 260px; display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        
        .qa-textarea, .qa-select {
            width: 100%; background-color: var(--input-bg); border: 1px solid var(--input-border);
            border-radius: 12px; padding: 12px; color: var(--input-text); font-size: 15px;
            box-sizing: border-box; outline: none; transition: border-color 0.2s, background-color 0.3s;
        }
        .qa-textarea { resize: none; }
        .focus-indigo:focus { border-color: #6366f1 !important; }
        .focus-emerald:focus { border-color: #10b981 !important; }
        .btn-submit { height: 44px; padding: 0 24px; border-radius: 12px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; transition: background-color 0.2s; }
        .btn-indigo { background-color: #4f46e5; color: white; }
        .btn-emerald { background-color: #059669; color: white; }
        .btn-cancel { background-color: #475569; color: #e2e8f0; height: 44px; padding: 0 18px; border-radius: 12px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; }
        
        .table-section { background-color: var(--table-bg); border: 1px solid var(--table-border); border-radius: 16px; padding: 20px; margin-bottom: 24px; transition: background-color 0.3s, border 0.3s; }
        .table-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .title-tc { color: #818cf8; }
        .title-cl { color: #34d399; }
        
        .qa-table { border-collapse: collapse !important; width: 100%; table-layout: fixed !important; }
        .qa-table th, .qa-table td { border: 2px solid #000000 !important; padding: 14px 12px !important; vertical-align: middle !important; font-size: 15px; word-break: break-word !important; overflow-wrap: break-word !important; }
        .qa-table thead th { background-color: var(--th-bg) !important; color: var(--th-text) !important; text-align: center !important; font-size: 12px; letter-spacing: 0.05em; transition: background-color 0.3s, color 0.3s; }
        
        .status-select { background-color: var(--th-bg); border: 1px solid var(--input-border); border-radius: 6px; padding: 4px; font-size: 12px; font-weight: 700; text-transform: uppercase; outline: none; cursor: pointer; width: 100%; text-align: center; color: var(--input-text); transition: background-color 0.3s, color 0.3s; }
        .status-select.untested { color: #94a3b8; }
        .status-select.passed { color: #059669; }
        .status-select.failed { color: #e11d48; }
        
        .steps-container { white-space: pre-wrap !important; display: block !important; font-family: monospace; font-size: 13px; color: var(--steps-text); line-height: 1.5; transition: color 0.3s; }
        .actions-cell { display: flex !important; justify-content: space-between !important; align-items: center !important; width: 100% !important; box-sizing: border-box !important; }
        .btn-edit { background-color: rgba(245, 158, 11, 0.15); color: #b45309; border: 1px solid rgba(245, 158, 11, 0.3); padding: 7px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
        [data-theme="dark"] .btn-edit { color: #fbbf24; }
        .btn-edit:hover { background-color: rgba(245, 158, 11, 0.3); }
        .btn-delete { height: 30px; width: 36px; background-color: #e11d48; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px -1px rgba(225, 29, 72, 0.2); }
        .btn-delete:hover { background-color: #be123c; }
    </style>
</head>
<body>
    <!-- ПАРЯЩИЙ МОДУЛЬ СОЗДАНИЯ -->
    <section id="formAnchor" class="floating-card">
        <div class="form-header">
            <div style="display: flex; align-items: center; gap: 16px;">
                <h1 id="formPanelTitle" style="margin: 0; font-size: 16px; font-weight: 700;">Создание Тест-кейса</h1>
                <!-- КНОПКА СМЕНЫ ТЕМЫ -->
                <button type="button" onclick="toggleTheme()" id="themeToggleBtn" class="theme-toggle-btn">
                    <span id="themeIcon">☀️</span> <span id="themeText">Светлая тема</span>
                </button>
            </div>
            <div class="tab-group">
                <button type="button" onclick="toggleFormMode('testcase')" id="formMode-testcase" class="tab-btn active-tc">Тест-кейс</button>
                <button type="button" onclick="toggleFormMode('checklist')" id="formMode-checklist" class="tab-btn inactive">Чек-лист</button>
            </div>
        </div>

        <form id="qaForm" class="form-grid">
            <input type="hidden" id="editId" value="">
            <div class="input-group">
                <label id="labelTitle">Описание тест-кейса</label>
                <textarea id="inputTitle" required rows="2" class="qa-textarea focus-indigo"></textarea>
            </div>
            <div id="wrapperSteps" class="input-group">
                <label>Шаги воспроизведения</label>
                <textarea id="inputSteps" rows="2" class="qa-textarea focus-indigo"></textarea>
            </div>
            <div id="wrapperExpected" class="input-group">
                <label>Ожидаемый результат</label>
                <textarea id="inputExpected" rows="2" placeholder="Открыт личный кабинет" class="qa-textarea focus-indigo"></textarea>
            </div>
            <div style="width: 140px; flex-shrink: 0;">
                <label style="font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; display: block; margin-bottom: 6px;">Статус</label>
                <select id="inputStatus" class="qa-select focus-indigo" style="height: 38px;">
                    <option value="untested">Untested</option>
                    <option value="passed">Passed</option>
                    <option value="failed">Failed</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px; flex-shrink: 0;">
                <button type="submit" id="submitBtn" class="btn-submit btn-indigo">Сохранить в базу</button>
                <button type="button" onclick="cancelEdit()" id="cancelEditBtn" class="btn-cancel" style="display: none;">Отмена</button>
            </div>
        </form>
    </section>
    <!-- СЕТКА СИММЕТРИЧНЫХ ТАБЛИЦ БАЗЫ ДАННЫХ -->
    <main>
        <section class="table-section">
            <h2 class="table-title title-tc">Репозиторий Тест-Кейсов (<span id="badge-testcase">0</span>)</h2>
            <table class="qa-table">
                <thead>
                    <tr>
                        <th style="width: 60px;">ID</th>
                        <th style="width: calc(100% - 370px - 32% - 25%); text-align: left !important;">Описание проверки</th>
                        <th style="width: 32%; text-align: left !important;">Шаги воспроизведения</th>
                        <th style="width: 25%; text-align: left !important;">Ожидаемый результат</th>
                        <th style="width: 130px;">Статус</th>
                        <th style="width: 180px;">Действия</th>
                    </tr>
                </thead>
                <tbody id="table-testcase"></tbody>
            </table>
        </section>

        <section class="table-section">
            <h2 class="table-title title-cl">Списки Чек-Листов (<span id="badge-checklist">0</span>)</h2>
            <table class="qa-table">
                <thead>
                    <tr>
                        <th style="width: 60px;">ID</th>
                        <th style="width: calc(100% - 370px); text-align: left !important;">Описание проверки</th>
                        <th style="width: 130px;">Статус</th>
                        <th style="width: 180px;">Действия</th>
                    </tr>
                </thead>
                <tbody id="table-checklist"></tbody>
            </table>
        </section>
    </main>

    <script>
        let allDocs = [];
        let activeFormMode = 'testcase';
        const stepsField = document.getElementById('inputSteps');

        // ИНИЦИАЛИЗАЦИЯ И СКРИПТ СМЕНЫ ТЕМЫ
        function initTheme() {
            const savedTheme = localStorage.getItem('qa-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeBtnUI(savedTheme);
        }

        // Переключение темы на лету
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('qa-theme', newTheme);
            updateThemeBtnUI(newTheme);
        }

        function updateThemeBtnUI(theme) {
            const icon = document.getElementById('themeIcon');
            const text = document.getElementById('themeText');
            if (theme === 'light') {
                icon.innerText = '🌙'; text.innerText = 'Тёмная тема';
            } else {
                icon.innerText = '☀️'; text.innerText = 'Светлая тема';
            }
        }

        initTheme(); // Вызываем инициализацию темы сразу при старте страницы

        stepsField.addEventListener('focus', function() { if (this.value === '') { this.value = '1. '; } });
        stepsField.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const text = this.value, caretPos = this.selectionStart;
                const textBeforeCaret = text.substring(0, caretPos), textAfterCaret = text.substring(caretPos);
                const linesBefore = textBeforeCaret.split('\n'), currentLine = linesBefore[linesBefore.length - 1];
                const match = currentLine.match(/^(\d+)\.\s(.*)/), emptyMatch = currentLine.match(/^(\d+)\.\s*$/);
                if (emptyMatch) {
                    linesBefore[linesBefore.length - 1] = ''; this.value = linesBefore.join('\n') + textAfterCaret;
                    this.selectionStart = this.selectionEnd = caretPos - currentLine.length;
                } else if (match) {
                    const insertText = `\n${parseInt(match, 10) + 1}. `;
                    this.value = textBeforeCaret + insertText + textAfterCaret;
                    this.selectionStart = this.selectionEnd = caretPos + insertText.length;
                } else {
                    this.value = textBeforeCaret + '\n' + textAfterCaret; this.selectionStart = this.selectionEnd = caretPos + 1;
                }
            }
        });

        ['inputTitle', 'inputExpected'].forEach(id => {
            document.getElementById(id).addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.stopPropagation(); } });
        });
        function toggleFormMode(mode) {
            activeFormMode = mode;
            const tcBtn = document.getElementById('formMode-testcase'), clBtn = document.getElementById('formMode-checklist');
            const wrapperSteps = document.getElementById('wrapperSteps'), wrapperExpected = document.getElementById('wrapperExpected');
            const labelTitle = document.getElementById('labelTitle'), formPanelTitle = document.getElementById('formPanelTitle'), submitBtn = document.getElementById('submitBtn');
            const isEditing = document.getElementById('editId').value !== "";
            const textareas = ['inputTitle', 'inputSteps', 'inputExpected'];

            if (mode === 'testcase') {
                tcBtn.className = "tab-btn active-tc"; clBtn.className = "tab-btn inactive";
                wrapperSteps.style.display = 'flex'; wrapperExpected.style.display = 'flex';
                labelTitle.innerText = "Описание тест-кейса"; formPanelTitle.innerText = isEditing ? "Редактирование Тест-кейса" : "Создание Тест-кейса";
                textareas.forEach(id => { document.getElementById(id).className = "qa-textarea focus-indigo"; });
                document.getElementById('inputStatus').className = "qa-select focus-indigo"; submitBtn.className = "btn-submit btn-indigo";
            } else {
                clBtn.className = "tab-btn active-cl"; tcBtn.className = "tab-btn inactive";
                wrapperSteps.style.display = 'none'; wrapperExpected.style.display = 'none';
                labelTitle.innerText = "Описание проверки"; formPanelTitle.innerText = isEditing ? "Редактирование Чек-листа" : "Создание Чек-листа";
                textareas.forEach(id => { document.getElementById(id).className = "qa-textarea focus-emerald"; });
                document.getElementById('inputStatus').className = "qa-select focus-emerald"; submitBtn.className = "btn-submit btn-emerald";
            }
        }

        async function updateStatusInline(id, newStatus, selectElement) {
            const doc = allDocs.find(d => d.id === id); if (!doc) return;
            const payload = { type: doc.type, title: doc.title, status: newStatus, steps: doc.steps, expected: doc.expected };
            const res = await fetch(`/api/documents/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (res.ok) { selectElement.className = `status-select ${newStatus}`; doc.status = newStatus; }
        }

        async function deleteDocument(id) {
            if (!confirm("Вы уверены, что хотите удалить эту запись?")) return;
            const res = await fetch(`/api/documents/${id}`, { method: 'DELETE' }); if (res.ok) { fetchDocs(); }
        }

        function startEdit(id) {
            const doc = allDocs.find(d => d.id === id); if (!doc) return;
            document.getElementById('editId').value = doc.id; toggleFormMode(doc.type);
            document.getElementById('inputTitle').value = doc.title;
            document.getElementById('inputSteps').value = doc.steps || '';
            document.getElementById('inputExpected').value = doc.expected || '';
            document.getElementById('inputStatus').value = doc.status;
            document.getElementById('submitBtn').innerText = "Обновить запись";
            document.getElementById('cancelEditBtn').style.display = 'inline-block';
            document.getElementById('formAnchor').scrollIntoView({ behavior: 'smooth' });
        }

        function cancelEdit() {
            document.getElementById('editId').value = ""; document.getElementById('inputTitle').value = "";
            document.getElementById('inputSteps').value = ""; document.getElementById('inputExpected').value = "";
            document.getElementById('inputStatus').value = "untested";
            document.getElementById('submitBtn').innerText = "Сохранить в базу";
            document.getElementById('cancelEditBtn').style.display = 'none'; toggleFormMode(activeFormMode);
        }

        async function fetchDocs() {
            try {
                const res = await fetch('/api/documents'); allDocs = await res.json() || []; renderTables();
            } catch (err) { console.error(err); }
        }

        function renderStatusSelectHTML(id, currentStatus) {
            return `
                <select onchange="updateStatusInline(${id}, this.value, this)" class="status-select ${currentStatus}">
                    <option value="untested" ${currentStatus === 'untested' ? 'selected' : ''}>Untested</option>
                    <option value="passed" ${currentStatus === 'passed' ? 'selected' : ''}>Passed</option>
                    <option value="failed" ${currentStatus === 'failed' ? 'selected' : ''}>Failed</option>
                </select>
            `;
        }

        function renderTables() {
            const tcBody = document.getElementById('table-testcase'), clBody = document.getElementById('table-checklist');
            const testcases = allDocs.filter(d => d.type === 'testcase'), checklists = allDocs.filter(d => d.type === 'checklist');
            document.getElementById('badge-testcase').innerText = testcases.length;
            document.getElementById('badge-checklist').innerText = checklists.length;
            const noData = (cols) => `<tr><td colspan="${cols}" class="text-center" style="color: #64748b; font-weight: 500;">Данные отсутствуют</td></tr>`;

            tcBody.innerHTML = testcases.length === 0 ? noData(6) : testcases.map(doc => `
                <tr>
                    <td style="text-align: center; color: #94a3b8; font-family: monospace; font-weight: 500;">${doc.id}</td>
                    <td style="font-weight: 600; text-align: left;">${escapeHtml(doc.title)}</td>
                    <td style="text-align: left;"><div class="steps-container">${escapeHtml(doc.steps || '—')}</div></td>
                    <td style="text-align: left;">${escapeHtml(doc.expected || '—')}</td>
                    <td style="text-align: center;">${renderStatusSelectHTML(doc.id, doc.status)}</td>
                    <td><div class="actions-cell"><button onclick="startEdit(${doc.id})" class="btn-edit">Редактировать</button><button onclick="deleteDocument(${doc.id})" class="btn-delete" title="Удалить">🗑</button></div></td>
                </tr>
            `).join('');

            clBody.innerHTML = checklists.length === 0 ? noData(4) : checklists.map(doc => `
                <tr>
                    <td style="text-align: center; color: #94a3b8; font-family: monospace; font-weight: 500;">${doc.id}</td>
                    <td style="font-weight: 600; text-align: left;">${escapeHtml(doc.title)}</td>
                    <td style="text-align: center;">${renderStatusSelectHTML(doc.id, doc.status)}</td>
                    <td><div class="actions-cell"><button onclick="startEdit(${doc.id})" class="btn-edit">Редактировать</button><button onclick="deleteDocument(${doc.id})" class="btn-delete" title="Удалить">🗑</button></div></td>
                </tr>
            `).join('');
        }

        document.getElementById('qaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const titleInput = document.getElementById('inputTitle'), stepsInput = document.getElementById('inputSteps'), expectedInput = document.getElementById('inputExpected'), statusSelect = document.getElementById('inputStatus');
            const payload = { type: activeFormMode, title: titleInput.value.trim(), status: statusSelect.value, steps: activeFormMode === 'testcase' ? stepsInput.value.replace(/\r\n/g, '\n').trim() : '', expected: activeFormMode === 'testcase' ? expectedInput.value.trim() : '' };
            let url = '/api/documents', method = 'POST';
            if (editId !== "") { url = `/api/documents/${editId}`; method = 'PUT'; }
            const res = await fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (res.ok) { cancelEdit(); fetchDocs(); }
        });

        function escapeHtml(text) { return text ? text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : ''; }
        fetchDocs();
    </script>
</body>
</html>
