<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA DocHub — Эксперементальная ветка предусловий</title>
    
    <!-- Подключение внешнего файла стилей -->
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <!-- ПАРЯЩИЙ МОДУЛЬ СОЗДАНИЯ -->
    <section id="formAnchor" class="floating-card">
        <div class="form-header">
            <div style="display: flex; align-items: center; gap: 16px;">
                <h1 id="formPanelTitle" style="margin: 0; font-size: 16px; font-weight: 700;">Создание Тест-кейса</h1>
                <button type="button" onclick="toggleTheme()" id="themeToggleBtn" class="theme-toggle-btn">
                    <span id="themeIcon">☀️</span> <span id="themeText">Светлая тема</span>
                </button>
            </div>
            <div class="tab-group">
                <button type="button" onclick="toggleFormMode('testcase')" id="formMode-testcase" class="tab-btn active-tc">Тест-кейс</button>
                <button type="button" onclick="toggleFormMode('checklist')" id="formMode-checklist" class="tab-btn inactive">Чек-лист</button>
            </div>
        </div>

        <form id="qaForm" class="form-grid">
            <input type="hidden" id="editId" value="">
            <div class="input-group">
                <label id="labelTitle">Описание тест-кейса</label>
                <textarea id="inputTitle" required rows="2" class="qa-textarea focus-indigo"></textarea>
            </div>
            <div id="wrapperSteps" class="input-group">
                <label>Шаги воспроизведения</label>
                <textarea id="inputSteps" rows="2" class="qa-textarea focus-indigo"></textarea>
            </div>
            <div id="wrapperExpected" class="input-group">
                <label>Ожидаемый результат</label>
                <textarea id="inputExpected" rows="2" placeholder="Открыт личный кабинет" class="qa-textarea focus-indigo"></textarea>
            </div>
            <div style="width: 140px; flex-shrink: 0;">
                <label style="font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; display: block; margin-bottom: 6px;">Статус</label>
                <select id="inputStatus" class="qa-select focus-indigo" style="height: 38px;">
                    <option value="untested">Untested</option>
                    <option value="passed">Passed</option>
                    <option value="failed">Failed</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px; flex-shrink: 0;">
                <button type="submit" id="submitBtn" class="btn-submit btn-indigo">Сохранить в базу</button>
                <button type="button" onclick="cancelEdit()" id="cancelEditBtn" class="btn-cancel" style="display: none;">Отмена</button>
            </div>
        </form>
    </section>

    <!-- СЕТКА СИММЕТРИЧНЫХ ТАБЛИЦ БАЗЫ ДАННЫХ -->
    <main>
        <section class="table-section">
            <h2 class="table-title title-tc">Репозиторий Тест-Кейсов (<span id="badge-testcase">0</span>)</h2>
            <table class="qa-table">
                <thead>
                    <tr>
                        <th style="width: 60px;">ID</th>
                        <th style="width: calc(100% - 370px - 32% - 25%); text-align: left !important;">Описание проверки</th>
                        <th style="width: 32%; text-align: left !important;">Шаги воспроизведения</th>
                        <th style="width: 25%; text-align: left !important;">Ожидаемый результат</th>
                        <th style="width: 130px;">Статус</th>
                        <th style="width: 180px;">Действия</th>
                    </tr>
                </thead>
                <tbody id="table-testcase"></tbody>
            </table>
        </section>

        <section class="table-section">
            <h2 class="table-title title-cl">Списки Чек-Листов (<span id="badge-checklist">0</span>)</h2>
            <table class="qa-table">
                <thead>
                    <tr>
                        <th style="width: 60px;">ID</th>
                        <th style="width: calc(100% - 370px); text-align: left !important;">Описание проверки</th>
                        <th style="width: 130px;">Статус</th>
                        <th style="width: 180px;">Действия</th>
                    </tr>
                </thead>
                <tbody id="table-checklist"></tbody>
            </table>
        </section>
    </main>

    <!-- Подключение внешнего файла скриптов -->
    <script src="/script.js"></script>
</body>
</html>
